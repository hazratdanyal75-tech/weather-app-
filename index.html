<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WeatherPro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>WeatherPro Dashboard</h1></header>
<main>
<section class="search">
<input id="cityInput" type="text" placeholder="City name" aria-label="city"/>
<button id="searchBtn">Get Weather</button>
</section>
<div id="loading" class="hidden" aria-live="polite">Loading…</div>
<div id="error" class="error hidden" aria-live="assertive"></div>
<section id="current" class="card" aria-live="polite"></section>
<section id="forecast" class="grid" aria-live="polite"></section>
</main>
<footer>© 2026 WeatherPro</footer>
<script src="script.js"></script>
</body>
</html>
